name: generate monkeytype readme svg
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-svg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Generate Monkeytype Readme SVG
        uses: monkeytype-hub/monkeytype-readme@v1.0.0
        with:
          username: snydermonk
          themes: tokyonight
          target-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
